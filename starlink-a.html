<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开机进度 — 星链组网 A</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f3f7;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#1a2332}
.card{background:#fff;border-radius:16px;border:1px solid #dde2e8;padding:24px 20px 18px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06);max-width:680px;width:100%}
.card h1{font-size:20px;font-weight:600;letter-spacing:2px;margin-bottom:2px}
.card .sub{font-size:12px;color:#8899aa;margin-bottom:14px;letter-spacing:1px}
.ctl{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;background:#f5f7fa;border-radius:10px;padding:10px 18px;border:1px solid #dde2e8}
.ctl label{color:#556677;font-size:13px}
.ctl input[type=range]{flex:1;max-width:300px;-webkit-appearance:none;height:4px;border-radius:2px;background:linear-gradient(90deg,#0077cc,#cc3366,#8855cc);outline:none}
.ctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:2px solid #0077cc;box-shadow:0 0 8px rgba(0,119,204,.3)}
.ctl .pv{font-weight:700;color:#0077cc;font-size:18px;min-width:40px;text-align:right}
.wrap{position:relative;width:100%;aspect-ratio:2/1;border-radius:10px;background:#f5f7fa;overflow:hidden;border:1px solid #dde2e8;margin-bottom:10px}
.wrap canvas{width:100%;height:100%;display:block}
.desc{font-size:12px;color:#667788;line-height:1.5}
.tag{display:inline-block;font-size:10px;padding:2px 12px;border-radius:8px;background:#fde8ec;color:#cc3366;margin-bottom:8px;letter-spacing:1px}
</style>
</head>
<body>
<div class="card">
<h1>🛸 星链组网 A</h1>
<p class="sub">STARLINK · 红色激光沿蓝色连接线</p>
<div class="ctl">
<label>进度</label>
<input type="range" id="sl" min="0" max="100" value="35">
<span class="pv" id="sv">35%</span>
</div>
<div class="wrap"><canvas id="cv" width="800" height="400"></canvas></div>
<p class="desc"><span class="tag">重叠版</span> 中央地球 · 3层轨道 · 卫星外形 · 红色激光沿蓝色连接线行走</p>
</div>
<script>
const sl=document.getElementById('sl'),sv=document.getElementById('sv');
let val=35,aid,gt=0;

function rndRect(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawEarth(cx,cy){
  const p=val/100,ctx=document.getElementById('cv').getContext('2d'),Er=48;
  const atmo=ctx.createRadialGradient(cx-2,cy-2,Er-4,cx,cy,Er+20);
  atmo.addColorStop(0,'rgba(100,180,255,'+(0.12*p)+')');atmo.addColorStop(0.6,'rgba(100,180,255,'+(0.04*p)+')');atmo.addColorStop(1,'rgba(100,180,255,0)');
  ctx.fillStyle=atmo;ctx.beginPath();ctx.arc(cx,cy,Er+20,0,6.28);ctx.fill();
  const og=ctx.createRadialGradient(cx-8,cy-8,5,cx,cy,Er);
  og.addColorStop(0,'#4a8fd4');og.addColorStop(0.3,'#3578b8');og.addColorStop(0.6,'#235f9a');og.addColorStop(0.85,'#14467a');og.addColorStop(1,'#0a2d55');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(cx,cy,Er,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(65,160,80,'+(0.25+0.1*p)+')';
  ctx.beginPath();ctx.moveTo(cx-20,cy-26);ctx.quadraticCurveTo(cx-15,cy-34,cx-5,cy-28);ctx.quadraticCurveTo(cx-1,cy-20,cx-10,cy-15);ctx.quadraticCurveTo(cx-18,cy-12,cx-23,cy-18);ctx.quadraticCurveTo(cx-25,cy-23,cx-20,cy-26);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx-15,cy-8);ctx.quadraticCurveTo(cx-8,cy-7,cx-6,cy-1);ctx.quadraticCurveTo(cx-5,cy+7,cx-9,cy+16);ctx.quadraticCurveTo(cx-14,cy+24,cx-18,cy+16);ctx.quadraticCurveTo(cx-21,cy+4,cx-15,cy-8);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+3,cy-28);ctx.quadraticCurveTo(cx+9,cy-26,cx+14,cy-20);ctx.quadraticCurveTo(cx+18,cy-15,cx+15,cy-8);ctx.quadraticCurveTo(cx+14,cy+2,cx+18,cy+12);ctx.quadraticCurveTo(cx+20,cy+20,cx+13,cy+28);ctx.quadraticCurveTo(cx+9,cy+30,cx+6,cy+22);ctx.quadraticCurveTo(cx+4,cy+15,cx+6,cy+6);ctx.quadraticCurveTo(cx+5,cy-1,cx+2,cy-8);ctx.quadraticCurveTo(cx-1,cy-15,cx+3,cy-28);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+16,cy-22);ctx.quadraticCurveTo(cx+26,cy-28,cx+36,cy-20);ctx.quadraticCurveTo(cx+40,cy-12,cx+32,cy-5);ctx.quadraticCurveTo(cx+28,cy-1,cx+30,cy+6);ctx.quadraticCurveTo(cx+32,cy+15,cx+25,cy+12);ctx.quadraticCurveTo(cx+18,cy+4,cx+20,cy-4);ctx.quadraticCurveTo(cx+18,cy-12,cx+16,cy-22);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,'+(0.04+0.03*p)+')';
  for(let i=0;i<8;i++){const ca=gt/5000+i*1.2,cr=Er*0.3+Math.random()*Er*0.5;ctx.beginPath();ctx.ellipse(cx+cr*Math.cos(ca),cy+Er*0.3*Math.sin(ca*0.7),6+Math.random()*12,3+Math.random()*4,ca*0.5,0,6.28);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,'+(0.04+0.06*p)+')';ctx.lineWidth=0.3;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(cx,cy,Math.abs(Er*0.55*Math.sin(i/5*6.28+gt/5000)),Er,0,0,6.28);ctx.stroke();}
}

function draw(){
  const cv=document.getElementById('cv');if(!cv)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,800,400);
  const p=val/100,cx=400,cy=200,Er=48;

  ctx.fillStyle='#f5f7fa';ctx.fillRect(0,0,800,400);
  for(let i=0;i<200;i++){const a=Math.random()*6.28,r=Math.random()*380;ctx.fillStyle='rgba(0,80,160,'+(0.01+0.04*p*(0.2+0.8*Math.sin(gt/1200+a*3)))+')';ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),0.3+Math.random()*0.7,0,6.28);ctx.fill();}
  const gd=ctx.createRadialGradient(cx,cy,0,cx,cy,320);
  gd.addColorStop(0,'rgba(200,215,240,'+(0.05*p)+')');gd.addColorStop(0.5,'rgba(200,215,240,'+(0.02*p)+')');gd.addColorStop(1,'rgba(245,247,250,0)');
  ctx.fillStyle=gd;ctx.fillRect(0,0,800,400);

  drawEarth(cx,cy);

  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.font='bold 26px system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=4;ctx.fillText(val+'%',cx,cy);ctx.shadowBlur=0;

  const orbits=[{cnt:6,r:84,sp:0.3,ph:0},{cnt:8,r:124,sp:-0.2,ph:1.5},{cnt:10,r:164,sp:0.16,ph:2.8}];
  for(const ob of orbits){ctx.strokeStyle='rgba(0,119,204,'+(0.015+0.025*p)+')';ctx.lineWidth=0.3;ctx.setLineDash([2,10]);ctx.beginPath();ctx.arc(cx,cy,ob.r,0,6.28);ctx.stroke();ctx.setLineDash([]);}

  // 卫星
  const satSz=2+p*0.6;
  for(const ob of orbits){const vn=Math.floor(p*ob.cnt);for(let i=0;i<vn;i++){const a=i/ob.cnt*6.28+gt/5000*ob.sp+ob.ph,x=cx+ob.r*Math.cos(a),y=cy+ob.r*Math.sin(a);
    ctx.fillStyle='rgba(0,119,204,'+(0.2+0.35*p)+')';ctx.fillRect(x-satSz*2.4,y-satSz*0.8,satSz*1.2,satSz*1.6);ctx.fillRect(x+satSz*1.2,y-satSz*0.8,satSz*1.2,satSz*1.6);
    ctx.fillStyle='rgba(0,119,204,'+(0.45+0.65*p)+')';rndRect(ctx,x-satSz*0.8,y-satSz*0.5,satSz*1.6,satSz,1.5);ctx.fill();
    ctx.strokeStyle='rgba(0,119,204,'+(0.2*p)+')';ctx.lineWidth=0.4;ctx.beginPath();ctx.moveTo(x,y-satSz*0.5);ctx.lineTo(x,y-satSz*1.8);ctx.stroke();
  }}

  // 蓝色连接线
  for(const ob of orbits){const vn=Math.floor(p*ob.cnt);for(let i=0;i<vn-1;i++){const a1=i/ob.cnt*6.28+gt/5000*ob.sp+ob.ph,a2=(i+1)/ob.cnt*6.28+gt/5000*ob.sp+ob.ph;
    ctx.strokeStyle='rgba(0,119,204,'+(0.04+0.08*p*(1-i/vn))+')';ctx.lineWidth=0.3+0.5*p*(1-i/vn);
    ctx.beginPath();ctx.moveTo(cx+ob.r*Math.cos(a1),cy+ob.r*Math.sin(a1));ctx.lineTo(cx+ob.r*Math.cos(a2),cy+ob.r*Math.sin(a2));ctx.stroke();
  }}

  // 红色激光 —— 沿蓝色连接线走
  for(let oi=0;oi<orbits.length;oi++){
    const ob=orbits[oi];const vn=Math.floor(p*ob.cnt);if(vn<2)continue;
    const segIdx=Math.floor((gt/2800+oi*3.1)%(vn-1));
    const t=(gt/2200+oi*0.9)%1;
    const a1=segIdx/ob.cnt*6.28+gt/5000*ob.sp+ob.ph;
    const a2=(segIdx+1)/ob.cnt*6.28+gt/5000*ob.sp+ob.ph;
    const x1=cx+ob.r*Math.cos(a1),y1=cy+ob.r*Math.sin(a1);
    const x2=cx+ob.r*Math.cos(a2),y2=cy+ob.r*Math.sin(a2);
    const px=x1+(x2-x1)*t,py=y1+(y2-y1)*t;
    const tl=0.1;const ta=Math.max(0,t-tl);
    const sx=x1+(x2-x1)*ta,sy=y1+(y2-y1)*ta;
    ctx.strokeStyle='rgba(220,50,60,'+(0.35+0.5*p)+')';ctx.lineWidth=1.4+1.4*p;
    ctx.shadowColor='rgba(220,50,60,'+(0.3*p)+')';ctx.shadowBlur=6;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(px,py);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,80,90,'+(0.4+0.6*p)+')';ctx.beginPath();ctx.arc(px,py,1.8+1.8*p,0,6.28);ctx.fill();
  }

  const ts=orbits.reduce((s,o)=>s+Math.floor(p*o.cnt),0),tm=orbits.reduce((s,o)=>s+o.cnt,0);
  ctx.fillStyle='rgba(0,119,204,0.12)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('● STARLINK VERSION A',12,10);
  ctx.fillStyle='#aabbcc';ctx.font='8px sans-serif';ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText('3 orbital planes  ·  inter-satellite laser links',788,388);
}

function loop(t){gt=t||0;draw();aid=requestAnimationFrame(loop);}
sl.addEventListener('input',()=>{val=parseInt(sl.value);sv.textContent=val+'%';});
loop();
</script>
</body>
</html>
